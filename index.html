<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Soare - Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden; /* Blocks horizontal page breaking */
            background-color: #ffffff;
        }
        .resume-wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            background-color: #ffffff;
        }
        iframe {
            /* This forces the browser text engine to draw 125% larger relative to standard desktop width */
            width: 125vw; 
            height: 125vh;
            
            /* This scales down the layout box itself without compressing the underlying text resolution */
            transform: scale(0.8); 
            transform-origin: top center;
            border: none;
        }
    </style>
</head>
<body>
    <div class="resume-wrapper">
        <iframe 
            src="VictorSoare-Resume.pdf#toolbar=0&navpanes=0&view=FitH" 
            title="Victor Soare Resume">
        </iframe>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Soare - Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #525659; /* Matches Chrome's native dark grey PDF background */
        }
        .pdf-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        iframe {
            /* Restricting the max-width forces the FitH calculation to snap to a clean, readable desktop size */
            width: 100%;
            max-width: 1100px; 
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <iframe 
            src="VictorSoare-Resume.pdf#toolbar=0&navpanes=0&view=FitH" 
            title="Victor Soare Resume">
        </iframe>
    </div>
</body>
</html>
